name: gleap_sdk
description: The Gleap SDK for Flutter is the easiest way to integrate Gleap into your apps!
version: 15.2.4
homepage: https://gleap.io

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  json_annotation: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  build_runner:
  json_serializable:

flutter:
  plugin:
    platforms:
      android:
        package: io.gleap.gleap_sdk
        pluginClass: GleapSdkPlugin
      ios:
        pluginClass: GleapSdkPlugin
      web:
        pluginClass: GleapSdkWeb
        fileName: gleap_sdk_web.dart
